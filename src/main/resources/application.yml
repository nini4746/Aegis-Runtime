server:
  port: ${SERVER_PORT:8100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

aegis:
  hs256:
    secret: ${HS256_SECRET:}
  rs256:
    private-key-path: ${RS256_PRIVATE_KEY_PATH:}
    public-key-path: ${RS256_PUBLIC_KEY_PATH:}
  es256:
    private-key-path: ${ES256_PRIVATE_KEY_PATH:}
    public-key-path: ${ES256_PUBLIC_KEY_PATH:}
  scheduler:
    permits: ${AEGIS_PERMITS:8}
    reject-threshold: ${AEGIS_REJECT_THRESHOLD:250.0}
  cache:
    enabled: ${AEGIS_CACHE_ENABLED:true}
    max-entries: ${AEGIS_CACHE_MAX_ENTRIES:2048}

policy:
  throttle-latency-ms: ${POLICY_THROTTLE_LATENCY_MS:50}
  throttle-failure-rate: ${POLICY_THROTTLE_FAILURE_RATE:0.25}
  dead-dwell-ms: ${POLICY_DEAD_DWELL_MS:5000}
  kill-memory-pressure: ${POLICY_KILL_MEMORY_PRESSURE:0.85}
  recover-cooldown-ms: ${POLICY_RECOVER_COOLDOWN_MS:10000}
  score-latency-ceiling-ms: ${POLICY_SCORE_LATENCY_CEILING_MS:100}
  sample-interval-ms: ${POLICY_SAMPLE_INTERVAL_MS:60000}
  kill-order: [ES256, RS256]
  min-share:
    HS256: 30
